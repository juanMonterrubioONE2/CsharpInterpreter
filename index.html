<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="styles.css">
    <title>Document</title>
</head>

<body>

    <header class="app-header text-white p-3">
        <img src="Csharp_Logo.png" class="logo" alt="C# Logo">
        <h1>Interpreter</h1>
    </header>

    <div class="layout d-flex">

        <button class="sidebar-toggle d-md-none" id="sidebarToggle" aria-label="Abrir menú">
        </button>

        <div class="sidebar-overlay d-md-none" id="sidebarOverlay"></div>

        <aside class="app-sidebar text-white p-4 shadow" id="sidebar">
            <h4 class="mb-4">MENÚ</h4>
            <button class="nav-btn">Inicio</button>
            <button class="nav-btn">Estructuras selectivas</button>
            <button class="nav-btn">Ciclos</button>
            <button class="nav-btn">Arreglos unidimensionales</button>
            <button class="nav-btn">Arreglos bidimensionales</button>
            <button class="nav-btn">Recursividad</button>
            <button class="nav-btn">Archivos</button>
        </aside>

        <main class="text-white p-3 p-md-4 flex-grow-1">
            <section>
                <div class="explanation-text">
                    <p>Este intérprete ejecuta el código paso a paso. Usa los botones para avanzar o reproducir
                        automáticamente.</p>
                </div>
                <div class="workspace">
                    <!--Panel editor de código -->
                    <div class="console-panel editor-panel">
                        <div class="console-header">
                            <span class="console-title">Editor</span>
                        </div>
                        <div class="editor-body">

                        </div>
                        <div class="editor-controls">
                            <button class="ctrl-btn"> Reiniciar</button>
                            <button class="ctrl-btn" disabled> Anterior</button>
                            <button class="ctrl-btn">Siguiente</button>
                            <button class="ctrl-btn primary"> Reproducir</button>
                            <div class="ctrl-progress">
                                <span class="ctrl-step">Paso 0 / 0</span>
                                <div class="pbar"><i></i></div>
                            </div>
                        </div>
                    </div>

                    <div class="side-panels">

                        <!-- Panel 1 -->
                        <div class="console-panel2">
                            <div class="console-header2">
                                <span class="console-title2">Paso actual</span>
                            </div>
                            <div class="console-body">
                            </div>
                        </div>

                        <!-- Panel 2 -->
                        <div class="console-panel">
                            <div class="console-header">
                                <span class="console-title">Variables</span>
                            </div>
                            <div class="console-body">
                            </div>
                        </div>

                        <!-- Panel 3 -->
                        <div class="console-panel">
                            <div class="console-header">
                                <span class="console-title">Salida</span>
                            </div>
                            <div class="console-body">
                            </div>
                        </div>

                    </div>

                </div>

            </section>
        </main>

    </div>

    <footer class="app-footer text-center p-3">c#</footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        const toggleBtn = document.getElementById('sidebarToggle');
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('sidebarOverlay');

        function openSidebar() {
            sidebar.classList.add('open');
            overlay.classList.add('active');
            document.body.classList.add('sidebar-open');
        }

        function closeSidebar() {
            sidebar.classList.remove('open');
            overlay.classList.remove('active');
            document.body.classList.remove('sidebar-open');
        }

        toggleBtn.addEventListener('click', () => {
            sidebar.classList.contains('open') ? closeSidebar() : openSidebar();
        });

        overlay.addEventListener('click', closeSidebar);

        document.querySelectorAll('.nav-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                if (window.innerWidth < 768) closeSidebar();
            });
        });
    </script>
</body>

</html>
