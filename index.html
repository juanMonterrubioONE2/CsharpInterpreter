<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="./css/styles.css">
    <title>Document</title>
</head>

<body>

    <header class="app-header text-white p-3">
        <img src="./img/Csharp_Logo.png" class="logo" alt="C# Logo">
        <h1>Interpreter</h1>
    </header>

    <div class="layout d-flex">

        <button class="sidebar-toggle d-md-none" id="sidebarToggle" aria-label="Abrir menú">
            &#9776;
        </button>

        <div class="sidebar-overlay d-md-none" id="sidebarOverlay"></div>

        <aside class="app-sidebar text-white p-4 shadow" id="sidebar">
            <h4 class="mb-4">MENÚ</h4>

            <button class="nav-btn" id="btn-inicio">
                <img src="./img/iconos/Inicio.png" class="nav-icon" alt="">
                <span class="nav-label">Inicio</span>
            </button>

            <!-- Estructuras selectivas -->
            <div class="nav-group">
                <button class="nav-btn has-sub">
                    <img src="./img/iconos/Selectivas.png" class="nav-icon" alt="">
                    <span class="nav-label">Estructuras selectivas</span>
                    <span class="nav-arrow">&#9662;</span>
                </button>
                <div class="nav-sub">
                    <button class="nav-sub-btn" data-tema="if">if</button>
                    <button class="nav-sub-btn" data-tema="switch">switch</button>
                    <button class="nav-sub-btn" data-tema="ternario">ternario</button>
                </div>
            </div>

            <!-- Ciclos -->
            <div class="nav-group">
                <button class="nav-btn has-sub">
                    <img src="./img/iconos/Ciclos.png" class="nav-icon" alt="">
                    <span class="nav-label">Ciclos</span>
                    <span class="nav-arrow">&#9662;</span>
                </button>
                <div class="nav-sub">
                    <button class="nav-sub-btn" data-tema="Ciclos_for">for</button>
                    <button class="nav-sub-btn" data-tema="Ciclos_while">while</button>
                    <button class="nav-sub-btn" data-tema="Ciclos_dowhile">do-while</button>
                </div>
            </div>

            <button class="nav-btn" data-tema="Array_unidimensional">
                <img src="./img/iconos/Array_Unidimensional.png" class="nav-icon" alt="">
                <span class="nav-label">Arreglos unidimensionales</span>
            </button>

            <button class="nav-btn" data-tema="Array_bidimensional">
                <img src="./img/iconos/Array_Bidimensional.png" class="nav-icon" alt="">
                <span class="nav-label">Arreglos bidimensionales</span>
            </button>

            <button class="nav-btn" data-tema="Recursividad">
                <img src="./img/iconos/Recursividad.png" class="nav-icon" alt="">
                <span class="nav-label">Recursividad</span>
            </button>

            <button class="nav-btn" data-tema="Archivos">
                <img src="./img/iconos/Archivos.png" class="nav-icon" alt="">
                <span class="nav-label">Archivos</span>
            </button>

        </aside>

        <main class="text-white p-3 p-md-4 flex-grow-1">
            <section>
                <div id="tema-titulo"></div>
                <div class="explanation-text" id="tema-descripcion" style="display:none;"></div>
                <div id="workspace-container"></div>
            </section>
        </main>

    </div>

    <footer class="app-footer text-center p-3">c#</footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="./js/consolas.js"></script>
    <script src="./js/temas/Ciclos_for.js"></script>
    <script src="./js/temas/Ciclos_while.js"></script>
    <script src="./js/temas/Ciclos_dowhile.js"></script>
    <script src="./js/temas/if.js"></script>
    <script src="./js/temas/switch.js"></script>
    <script src="./js/temas/ternario.js"></script>
    <script src="./js/temas/Array_unidimensional.js"></script>
    <script src="./js/temas/Array_bidimensional.js"></script>
    <script src="./js/temas/Recursividad.js"></script>
    <script src="./js/temas/Archivos.js"></script>
    <script src="./js/script.js"></script>

</body>
</html>
